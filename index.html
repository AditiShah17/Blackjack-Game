<html>
<head>
    <title>Blackjack Game</title>
    <link rel="stylesheet" href="index.css">
    
</head>
<body>
    <h1>Welcome to Blackjack Game</h1>
    <p>
        This is a simple implementation of the classic card game Blackjack using JavaScript. 
        The game allows you to play against the dealer, and the goal is to get a hand value as close to 21 as possible without going over.
    </p>
    <p id="message-el">Want to play a round?</p>
    <p id="card-el">Cards:</p>
    <p id="sum-el">Sum:</p>
    <button id="start-btn" onclick="startGame()">Start Game</button>
    <button id="new-btn" onclick="newCard()">New Card</button>
    <p id="player-el"></p>
    <script src="index.js"></script>
</body>
</html>
